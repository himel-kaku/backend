<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>University Portal - Course & Upload Manager</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: grid; grid-template-columns: 300px 1fr; grid-template-rows: auto 1fr; gap: 20px; padding: 20px; background-color: #f4f7f6; height: 95vh; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-top: 4px solid #007bff; overflow-y: auto; }
        #part1 { grid-column: 1; }
        #part2 { grid-column: 1; }
        #part3 { grid-column: 2; grid-row: 1 / 3; }
        #part4 { grid-column: 1; }
        
        h2 { margin-top: 0; color: #333; font-size: 1.1rem; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        input, button { width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; border-radius: 4px; }
        button:hover { background: #0056b3; }
        
        .list-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; }
        .list-item:hover { background: #f0f7ff; color: #007bff; }
        
        .plot-container { border: 1px solid #ddd; margin-bottom: 15px; padding: 10px; border-radius: 5px; background: #fff; }
        .file-link { color: #28a745; text-decoration: none; cursor: pointer; display: block; margin: 5px 0; font-size: 0.9rem; }
        .file-link:hover { text-decoration: underline; }
        
        .upload-box { background: #f9f9f9; padding: 10px; margin-top: 10px; border-top: 1px dashed #ccc; }
        .upload-box input[type="file"] { font-size: 0.8rem; }
        .upload-btn { background: #6c757d; font-size: 0.8rem; padding: 5px; }
        
        pre { background: #222; color: #0f0; padding: 10px; font-size: 11px; height: 150px; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="card" id="part1">
        <h2>1. Authentication</h2>
        <input type="text" id="userId" placeholder="User ID">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <p id="authStatus" style="font-size: 0.8rem;">Status: Not Logged In</p>
    </div>

    <div class="card" id="part2">
        <h2>2. My Courses</h2>
        <button onclick="fetchCourses()">Load Courses</button>
        <div id="courseList"></div>
    </div>

    <div class="card" id="part4">
        <h2>4. System Logs</h2>
        <pre id="logs">Ready...</pre>
    </div>

    <div class="card" id="part3">
        <h2>3. Course Materials & Uploads</h2>
        <div id="plotList">Select a course from the left...</div>
    </div>

    <script>
        let jwtToken = "";
        const API_BASE = "http://localhost:3000/api";

        function log(msg) {
            const logs = document.getElementById('logs');
            logs.innerText = `> ${msg}\n` + logs.innerText;
        }

        async function login() {
            const id = document.getElementById('userId').value;
            const pass = document.getElementById('password').value;
            try {
                const res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id, password: pass })
                });
                const data = await res.json();
                if(data.success) {
                    jwtToken = data.token;
                    document.getElementById('authStatus').innerText = "Logged In ✅";
                    log("Login Successful");
                } else { alert(data.message); }
            } catch (err) { log("Error: " + err.message); }
        }

        async function fetchCourses() {
            if(!jwtToken) return alert("Please login first");
            try {
                const res = await fetch(`${API_BASE}/user/my-courses`, {
                    headers: { 'Authorization': `Bearer ${jwtToken}` }
                });
                const data = await res.json();
                const container = document.getElementById('courseList');
                container.innerHTML = "";
                data.courses.forEach(c => {
                    const div = document.createElement('div');
                    div.className = "list-item";
                    div.innerHTML = `<strong>${c.code}</strong><br><small>${c.title}</small>`;
                    div.onclick = () => fetchMaterials(c.id);
                    container.appendChild(div);
                });
            } catch (err) { log("Course Fetch Error: " + err.message); }
        }

        async function fetchMaterials(courseId) {
            log(`Opening Course ID: ${courseId}`);
            try {
                const res = await fetch(`${API_BASE}/user/course-materials/${courseId}`, {
                    headers: { 'Authorization': `Bearer ${jwtToken}` }
                });
                const data = await res.json();
                const container = document.getElementById('plotList');
                container.innerHTML = `<h3>Materials for ${data.section}</h3>`;

                data.plots.forEach(plot => {
                    const plotDiv = document.createElement('div');
                    plotDiv.className = "plot-container";
                    
                    let filesHtml = plot.files.map(f => 
                        `<span class="file-link" onclick="downloadFile(${f.file_id})">📄 ${f.file_name}</span>`
                    ).join('');

                    plotDiv.innerHTML = `
                        <strong>📅 Date: ${new Date(plot.date).toDateString()}</strong>
                        <div>${filesHtml || '<small style="color:gray">No files uploaded yet.</small>'}</div>
                        
                        <div class="upload-box">
                            <label style="font-size:0.7rem">Upload to this date:</label>
                            <input type="file" id="file-${plot.plot_id}">
                            <button class="upload-btn" onclick="uploadFile(${plot.plot_id}, ${courseId})">Upload PDF</button>
                        </div>
                    `;
                    container.appendChild(plotDiv);
                });
            } catch (err) { log("Materials Error: " + err.message); }
        }

        async function uploadFile(plotId, courseId) {
            const fileInput = document.getElementById(`file-${plotId}`);
            if (!fileInput.files[0]) return alert("Select a file first");

            const formData = new FormData();
            formData.append('plot_id', plotId);
            formData.append('file', fileInput.files[0]);

            log(`Uploading to Plot ${plotId}...`);
            try {
                const res = await fetch(`${API_BASE}/upload/class-files`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${jwtToken}` },
                    body: formData
                });
                const data = await res.json();
                if (data.success) {
                    log("Upload Success!");
                    //fetchMaterials(courseId);
                } else {
                    log("Upload Failed: " + data.message);
                }
            } catch (err) { log("Upload Error: " + err.message); }
        }

        async function downloadFile(fileId) {
            log(`Downloading File ID: ${fileId}`);
            try {
                const res = await fetch(`${API_BASE}/download/${fileId}`, {
                    headers: { 'Authorization': `Bearer ${jwtToken}` }
                });
                const blob = await res.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = ""; 
                document.body.appendChild(a);
                a.click();
                log("File downloaded.");
            } catch (err) { log("Download Error: " + err.message); }
        }
    </script>
</body>
</html>
